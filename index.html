<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HW_14_Form_Style</title>
        <link rel="stylesheet" href="./css/style.css">
    </head>
    <body>
        <header class="header">
            <div class="container">
                <h1>HW_14 Form Style</h1>
            </div>
        </header>
        <main class="main">
            <div class="container">
                <section class="section">
                    <div class="side">
                        <h2 class="title_2">Create an Account</h2>
                        <form class="form" action="#" method="POST">
                            <div class="row">
                                <div class="col col_half">
                                    <label for="first-name" class="label">First Name</label>
                                    <input type="text" id="first-name" required>
                                </div>
                                <div class="col col_half">
                                    <label for="last-name" class="label">Last Name</label>
                                    <input type="text" id="last-name" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col col_full">
                                    <label for="mail"
                                        class="label">E-mail</label>
                                    <input type="email" id="mail" required>
                                    <p class="text">We'll never share your email
                                        with anyone else.</p>
                                </div>
                            </div>

                            <div class="form__gender gender">
                                <div class="gender__item">

                                    <label for="gender-male">

                                        <input type="radio" name="gender" id="gender-male" value="male" class="visually-hidden">
                                        <span class="gender__check"></span>
                                        Male

                                    </label>
                                    <label for="gender-female">
                                        
                                        <input type="radio" name="gender" id="gender-female" value="female" class="visually-hidden">
                                        <span class="gender__check"></span>
                                        Female

                                    </label>
                                </div>

                                <div class="row">
                                    <div class="col col_half">
                                        <label for="country" class="label">Country</label>
                                        <select id="country" class="select">
                                            <option value="">Select</option>
                                            <option value="ukraine">UkraineUkraineUkraineUkraineUkraine</option>
                                            <option value="usa">USA</option>
                                        </select>
                                    </div>
                                    <div class="col col_half">
                                        <label for="city" class="label">City</label>
                                        <input type="text" id="city" required minlength="2">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <button type="submit" class="btn btn_full">Sign Up</button>
                            </div>
                            <p class="terms-text">By clicking the 'Sign Up' button, you confirm that you accept our <br>
                                <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
                            </p>
                            <hr class="divider">
                            <p class="login-offer">Have an account? <a href="#">Log In</a></p>
                        </form>
                    </div>
                    <div class="side">
                        <h2 class="title_2">Profile</h2>
                        <form class="form" action="#" method="POST" enctype="multipart/form-data">
                            <div class="avatar-row">
                                <div class="avatar-preview">
                                    <img src="./assets/img/image.png" alt="Profile avatar">
                                </div>
                                <div class="avatar-controls">
                                    <div class="upload-field">
                                        <label for="avatar-upload" class="upload-label">
                                            <input type="file" id="avatar-upload" class="visually-hidden">
                                            <span class="camera-icon"></span> 
                                        </label>
                                    </div>
                                    <button type="button" class="btn-delete"></button>
                                    <p class="upload-text">Up to 1 MB (300x300 px)</p>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col col_half">
                                    <label for="prof-name" class="label">Name</label>
                                    <input type="text" id="prof-name" required>
                                </div>
                                <div class="col col_half">
                                    <label for="prof-email" class="label">E-mail</label>
                                    <input type="email" id="prof-email" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col col_half">
                                    <label for="prof-country" class="label">Country</label>
                                    <select id="prof-country" class="select">
                                        <option value="">Select</option>
                                        <option value="ua">UkraineUkraineUkraineUkraineUkraineUkraine</option>
                                        <option value="usa">USA</option>
                                    </select>
                                </div>
                                <div class="col col_half">
                                    <label for="prof-city" class="label">City</label>
                                    <input type="text" id="prof-city" required minlength="2">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col col_half">
                                    <label for="prof-zip" class="label">Zip Code</label>
                                    <input type="text" id="prof-zip" pattern="[0-9]{5,6}" title="5 or 6 digits" required>
                                </div>
                                <div class="col col_half">
                                    <label for="prof-phone" class="label">Phone Number</label>
                                    <input type="tel" id="prof-phone" placeholder="+380..." required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn_update">Update</button>
                        </form>
                    </div>
                </section>
            </div>

        </main>
    </body>
</html>
