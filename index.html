<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HW_14_Form_Style</title>
        <link rel="stylesheet" href="./css/style.css">
    </head>
    <body>
        <header class="header">
            <div class="container">
                <h1>HW_14 Form Style</h1>
            </div>
        </header>
        <main class="main">
            <div class="container">
                <section class="section">
                    <div class="side">
                        <h2 class="title_2">Create an Account</h2>
                        <form class="form">
                            <div class="row">
                                <div class="col col_half">
                                    <label for="first-name" class="label">First
                                        Name</label>
                                    <input type="text" id="first-name">
                                </div>
                                <div class="col col_half">
                                    <label for="last-name" class="label">Last
                                        Name</label>
                                    <input type="text" id="last-name">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col col_full">
                                    <label for="mail"
                                        class="label">E-mail</label>
                                    <input type="email" id="mail">
                                    <p class="text">We'll never share your email
                                        with anyone else.</p>
                                </div>
                            </div>

                            <div class="form__gender gender">
                                <div class="gender__item">

                                    <label for="gender-male">

                                        <input type="radio" name="gender" id="gender-male" value="male" class="visually-hidden">
                                        <span class="gender__check"></span>
                                        Male

                                    </label>
                                    <label for="gender-female">
                                        
                                        <input type="radio" name="gender" id="gender-female" value="female" class="visually-hidden">
                                        <span class="gender__check"></span>
                                        Female

                                    </label>
                                </div>

                                <div class="row">
                                    <div class="col col_half">
                                        <label for="country" class="label">Country</label>
                                        <select id="country" class="select">
                                            <option value="">Select</option>
                                            <option value="ukraine">UkraineUkraineUkraineUkraineUkraine</option>
                                        </select>
                                    </div>
                                    <div class="col col_half">
                                        <label for="city" class="label">City</label>
                                        <input type="text" id="city">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <button class="btn btn_full">Sign Up</button>
                            </div>
                            <p class="terms-text">By clicking the 'Sign Up' button, you confirm that you accept our <br>
                                <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
                            </p>
                            <hr class="divider">
                            <p class="login-offer">Have an account? <a href="#">Log In</a></p>
                        </form>
                    </div>
                    <div class="side">
                        <h2 class="title_2">Profile</h2>
                        <div class="row">
                            <button class="btn btn_min">Sign Up</button>
                        </div>
                    </div>
                </section>
            </div>

        </main>
    </body>
</html>
